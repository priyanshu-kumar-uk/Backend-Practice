services:
  backend:  
    build: ./BACKEND
    ports:
      - "8080:3000"
    volumes:
      - ./BACKEND:/app
      - backend_node_modules:/app/node_modules
    command: npm run dev
 
  frontend:
    build: ./FRONTEND
    ports:
      - "5173:5173"
    volumes:
      - ./FRONTEND:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev


volumes:
  backend_node_modules:
  frontend_node_modules:


  # for using together run frontend and backend 